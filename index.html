<!DOCTYPE html>
<html lang="fr">
<script>
const montantRecu = 454410; // Montant reçu actuel
</script>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progression de la Récolte - Objectif 70%</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background: #000000;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden; 
        }

        body::before {
            content: '';
            position: absolute;
            top: 20px; bottom: 20px; left: 20px; right: 20px;
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: 15px;
            pointer-events: none;
        }

        .container {
            width: 85%;
            max-width: 1400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .date {
            font-family: 'Amiri', serif;
            font-size: 3vw;
            color: #D4AF37; 
            margin-bottom: 4vh;
            text-transform: capitalize;
            text-shadow: 0 2px 10px rgba(212, 175, 55, 0.3);
        }

        .metric {
            margin-bottom: 7vh; /* Légèrement augmenté pour laisser de la place au texte au-dessus de la barre */
            text-align: center;
            background: rgba(255, 255, 255, 0.02);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(212, 175, 55, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 100%;
        }

        .label {
            font-family: 'Amiri', serif;
            font-size: 2.2vw;
            color: #E0E0E0;
            margin-bottom: 10px;
        }

        #montantRecu {
            font-size: 7vw;
            font-weight: 800;
            color: #D4AF37;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
            letter-spacing: 2px;
        }

        #objectif {
            font-size: 1.8vw;
            color: #8892b0;
            margin-top: 15px;
            font-weight: 400;
        }

        .highlight-frais {
            font-size: 1.4vw;
            color: #596585;
        }

        #progressBar {
            width: 100%;
            height: 7vh;
            background-color: rgba(255, 255, 255, 0.05);
            border: 2px solid #D4AF37;
            border-radius: 50px;
            /* overflow: hidden; retiré pour permettre au texte de dépasser au-dessus */
            position: relative;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8), 0 0 20px rgba(212, 175, 55, 0.15);
            margin-bottom: 2vh;
        }

        #progressFill {
            height: 100%;
            width: 0%; 
            background: linear-gradient(90deg, #8A5A19 0%, #D4AF37 50%, #F3E5AB 100%);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
            transition: width 2s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            align-items: center;
            justify-content: flex-end; 
            padding-right: 20px;
            box-sizing: border-box;
            position: relative;
            border-radius: 50px; /* Arrondi ajouté ici pour épouser le conteneur */
            z-index: 1;
        }

        #progressText {
            font-size: 2.5vw;
            font-weight: 700;
            color: #000; 
            text-shadow: 0 1px 2px rgba(255,255,255,0.5);
        }

        /* Styles pour les repères */
        .marker {
            position: absolute;
            top: 0;
            bottom: 0;
            border-left: 1px dashed rgba(255, 255, 255, 0.3);
            z-index: 5;
            pointer-events: none;
        }

        .marker-percent {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            left: 8px;
            font-size: 1.2vw;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 700;
            text-shadow: 1px 1px 3px #000;
        }

        /* --- STYLE SPÉCIFIQUE POUR L'OBJECTIF CIBLE (70%) --- */
        #marker70 {
            left: 70%;
            border-left: 3px solid #D4AF37; 
            z-index: 6; 
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.7); 
            animation: target-pulse 2s infinite; 
        }

        #marker70 .marker-percent {
            color: #FFF;
            font-size: 1.4vw;
            text-shadow: 0 0 10px rgba(212, 175, 55, 1), 1px 1px 2px #000;
        }

        .marker-label {
            position: absolute;
            top: -4.5vh; /* Déplace le texte au-dessus de la barre */
            left: -3vw; /* Ajuste la position horizontale */
            font-size: 1.3vw;
            color: #F3E5AB;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 800;
            text-shadow: 2px 2px 5px #000, 0 0 10px rgba(212, 175, 55, 0.5);
            transform: rotate(-12deg); /* Inclinaison du texte */
            white-space: nowrap; /* Empêche le texte de passer à la ligne */
        }

        /* --- BLOC MOTIVATION SOUS LA BARRE --- */
        #motivationTarget {
            font-size: 2vw;
            color: #E0E0E0;
            background: rgba(212, 175, 55, 0.08);
            padding: 15px 40px;
            border-radius: 30px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 500;
        }

        #motivationTarget strong {
            color: #F3E5AB; 
            font-size: 2.2vw;
            font-weight: 800;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }

        /* Keyframes pour l'animation de pulsation de la cible */
        @keyframes target-pulse {
            0% { box-shadow: 0 0 10px rgba(212, 175, 55, 0.6); border-left-color: #8A5A19; }
            50% { box-shadow: 0 0 25px rgba(212, 175, 55, 1); border-left-color: #F3E5AB; }
            100% { box-shadow: 0 0 10px rgba(212, 175, 55, 0.6); border-left-color: #8A5A19; }
        }

        #qrcode {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: #fff;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            border: 2px solid #D4AF37;
        }

        #qrcode img {
            width: 100px;
            height: 100px;
            display: block;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="date" id="currentDate"></div>
        
        <div class="metric">
            <div class="label">Al Hamdulillah, nous avons récolté :</div>
            <div id="montantRecu">0 CHF</div>
            <div id="objectif">Objectif Final : 740'000 CHF <span class="highlight-frais">(+ frais ~60k)</span></div>
        </div>

        <div id="progressBar">
            <div id="progressFill">
                <span id="progressText">0%</span>
            </div>
            
            <div id="marker70" class="marker">
                <span class="marker-label">Prochain Objectif !</span>
                <span class="marker-percent">70%</span>
            </div>
            
            <div class="marker" style="left: 80%;"><span class="marker-percent">80%</span></div>
            <div class="marker" style="left: 90%;"><span class="marker-percent">90%</span></div>
        </div>

        <div id="motivationTarget">
            🚀 Encore <strong id="manquantTarget">-- CHF</strong> pour atteindre le palier des 70% !
        </div>

    </div>
    <div id="qrcode"></div>

    <script>
        const montantTotal = 740000;
        const palierCible70 = montantTotal * 0.70; // 518'000 CHF
        
        // Fonction pour formater les montants en format suisse
        function formatMontantSuisse(montant) {
            return montant.toLocaleString('fr-CH').replace(/\s/g, "'");
        }
        
        const pourcentage = (montantRecu / montantTotal) * 100;

        // Insertion du montant avec la devise
        document.getElementById('montantRecu').textContent = `${formatMontantSuisse(montantRecu)} CHF`;

        // Calcul du montant manquant pour le palier de 70%
        const panelMotivation = document.getElementById('motivationTarget');
        if (montantRecu < palierCible70) {
            const manquant70 = palierCible70 - montantRecu;
            document.getElementById('manquantTarget').textContent = `${formatMontantSuisse(Math.round(manquant70))} CHF`;
        } else {
            // Si 70% est atteint
            panelMotivation.innerHTML = "🎉 <strong>Objectif 70% Atteint !</strong> Al Hamdulillah. Continuons l'effort !";
            panelMotivation.style.background = "rgba(85, 224, 111, 0.1)"; 
            panelMotivation.style.border = "1px solid rgba(85, 224, 111, 0.4)";
            document.getElementById('marker70').style.animation = "none";
            document.getElementById('marker70').style.borderLeftColor = "#55e06f"; 
            document.querySelector('.marker-label').style.color = "#55e06f"; 
            document.querySelector('.marker-label').textContent = "Objectif Atteint !";
        }

        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        
        const pourcentageAffichage = pourcentage > 100 ? 100 : pourcentage;
        progressText.textContent = `${pourcentageAffichage.toFixed(1)}%`;

        // Animation douce de la barre de progression
        setTimeout(() => {
            progressFill.style.width = `${pourcentageAffichage}%`;
            if (pourcentage < 8) {
                progressFill.style.justifyContent = 'flex-start';
                progressFill.style.paddingLeft = '20px';
            }
        }, 300);

        // Affichage de la date du jour
        const currentDate = new Date();
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('currentDate').textContent = currentDate.toLocaleDateString('fr-FR', options);
        
        // QR code logic
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.has(param);
        }

        if (getQueryParam('displayQrCode')) {
            const qr = qrcode(0, 'L');
            qr.addData('https://docs.google.com/forms/d/e/1FAIpQLSc7BlKx-n79_-pOm46anvRlnRTNFY37br7CZTgdKmvE-VHM3Q/viewform');
            qr.make();
            document.getElementById('qrcode').innerHTML = qr.createImgTag(4);
        }
    </script>
</body>
</html>
